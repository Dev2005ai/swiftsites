[build]
  command = "mkdir -p public/fonts && cp index.html styles.css fonts.css script.js agb.html datenschutz.html impressum.html _redirects LogoSS-removebg-preview.png googlecc8d98b0b6e73d17.html public/ && cp fonts/*.woff2 public/fonts/ 2>/dev/null || true"
  publish = "public"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://images.unsplash.com https://api.microlink.io; connect-src 'self'; frame-ancestors 'none';"
